<div class="container">
<header>
  <h1 id="destaques-header" class="text-center my-4 text-underline pt-4">
    Destaques
  </h1>
</header>

<div class="row">
  <div class="col-lg-12 mt-3 py-3">
    <div id="destaques" class="row mx-2 py-2 justify-content-center align-items-stretch">
      @for (curso of cursosDestaques; track curso.id) {
        <div class="col-12 col-md-6 col-lg-4 mb-4">
          <app-curso-card [curso]="curso" />
        </div>
      }
    </div>
  </div>
</div>
</div>
