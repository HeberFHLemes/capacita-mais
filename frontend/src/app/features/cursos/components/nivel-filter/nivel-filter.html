<div class="card p-3 mb-3 shadow-sm">
  <fieldset class="border-0 m-0 p-0">
    <legend class="fw-bold mb-3 h4">Nível</legend>
    <div class="form-check">
      <input
        class="form-check-input"
        type="radio"
        [formControl]="nivelControl"
        value="todos"
        id="radio-nivel-todos"
        name="nivel"
      />
      <label class="form-check-label" for="radio-nivel-todos">Todos</label>
    </div>

    @for (nivel of NIVEIS; track nivel.valor) {
      <div class="form-check">
        <input
          class="form-check-input"
          type="radio"
          [formControl]="nivelControl"
          [value]="nivel.valor"
          id="radio-nivel-{{ nivel.valor }}"
          name="nivel"
        />

        <label class="form-check-label"  for="radio-nivel-{{ nivel.valor }}">
          {{ nivel.label }}
        </label>
      </div>
    }
  </fieldset>
</div>
