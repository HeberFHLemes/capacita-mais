<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-10 col-sm-10 col-md-8 col-lg-6 col-xxl-5 m-5">
      <div class="card shadow-sm mt-3 p-2 rounded-4">
        <div class="card-title mt-4">
          <h1 class="h2 text-center">
            Criar nova conta
          </h1>
        </div>

        <div class="card-body p-4">
          <form id="form-login"> <!-- TODO: implementar submit e validação-->

            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="email" placeholder="seuemail@exemplo.com">
              <label for="email">E-mail</label>
            </div>

            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="nome" placeholder="Nome">
              <label for="nome">Nome</label>
            </div>

            <div class="form-floating mb-3">
              <input type="password" class="form-control" id="senha" placeholder="Senha">
              <label for="senha">Senha</label>
            </div>

            <div class="form-floating mb-3">
              <input type="password" class="form-control" id="confirmar-senha" placeholder="Confirme sua senha">
              <label for="confirmar-senha">Confirme sua senha</label>
            </div>

            <button
              id="btn-entrar"
              type="submit"
              class="btn btn-primary w-100 my-3"
              >
              Quero me cadastrar
            </button>

            <div class="mb-3 text-center">
              Já tem uma conta? <a id="redirect-entrar" routerLink="/login">Entrar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
