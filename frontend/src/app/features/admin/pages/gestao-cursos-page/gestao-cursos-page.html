<div class="container ms-0">
  <div id="gestao-cursos-header" class="row justify-content-between mt-4 ms-2">
    <div id="gestao-cursos-title" class="col-6">
      <h1>Cursos</h1>
    </div>

    <div class="col-5 text-end">
      <button
        class="btn btn-primary"
        id="btn-novo-curso"
        routerLink="/admin/cursos/novo-curso"
      >
        <i class="bi bi-plus me-2"></i>
        Novo curso
      </button>
    </div>
    <div class="col-1"></div>

    <p id="gestao-cursos-descricao" class="p-1 ms-2">
      Gerencie os cursos disponíveis na plataforma
    </p>
  </div>

  <!-- TODO: search bar admin -->

  <div class="container">
    <div id="catalogo-gestao-cursos" class="row align-items-stretch">
      @for (curso of this.cursos; track curso.id) {
        <div class="col-12 col-md-6 col-lg-4 mb-4">
         <app-gestao-curso-card
           [curso]="curso"
           (remover$)="onRemoverCurso($event)"
         />
        </div>
      }
    </div>
  </div>
</div>
