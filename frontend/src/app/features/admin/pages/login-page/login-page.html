<div class="bg-light d-flex flex-column justify-content-center align-items-center min-vh-100">
  <div class="card shadow-sm p-4 login-card">

  <h1 class="h4 text-center mb-4">Acesso Administrativo</h1>

  @if (erro) {
    <div class="alert alert-danger" role="alert">
      {{ mensagemErro }}
    </div>
  }

  <form id="form-login" method="post" action="http://localhost:8080/api/login">
    <div class="mb-3">
      <label for="email" class="form-label">E-mail</label>
      <input
        autofocus="on"
        type="email"
        name="email"
        id="email"
        class="form-control"
        required
        placeholder="admin@capacita.com"
      />
    </div>

    <div class="mb-3">
      <label for="senha" class="form-label">Senha</label>
      <input type="password" id="senha" name="senha" class="form-control" required placeholder="••••••••" />
    </div>

    <button type="submit" class="btn btn-primary w-100">Entrar</button>
  </form>

  <p class="text-center mt-3">
    <a routerLink="/" class="text-decoration-none">Voltar ao site principal</a>
  </p>

</div>
</div>
