<div class="card h-100 shadow-sm card-hover card-curso">
  <div class="card-body d-flex flex-column">
    <h2 class="card-title fw-bold">
      {{ curso.nome }}
    </h2>
    <div class="mb-2 d-flex gap-2 flex-wrap">
      <span class="badge bg-primary">{{ curso.categoria.nome }}</span>
      <span class="badge bg-secondary">{{ nivelCurso }}</span>
      <span class="badge bg-success">
      @if (emPromocao) {
        <s>R$ {{ curso.preco_original }}</s> &nbsp; R$ {{ curso.preco }}
      } @else {
        R$ {{ curso.preco }}
      }
      </span>
    </div>
    <p class="card-text text-secondary flex-grow-1 card-curso-descricao">
      {{ curso.descricao ?? '' }}
    </p>
    <div class="row justify-content-between mx-auto w-100">
      <button
        class="btn btn-outline-dark col-5"
        [routerLink]="['/admin/cursos', curso.id, 'editar']"
      >
        <i class="bi bi-pencil me-2"></i>
        Editar
      </button>

      <button
        class="btn btn-outline-danger col-5"
        (click)="remover()"
      >
        <i class="bi bi-trash me-2"></i>
        Remover
      </button>
    </div>
  </div>
</div>
